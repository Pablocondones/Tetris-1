<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div id="menu" class="overlay">
        <h1 class="main-logo">TETRIS</h1>
        <button id="start-btn">START GAME</button>
    </div>

    <div id="game-container" style="display: none;">
        <canvas id="tetris" width="240" height="480"></canvas>
        <div id="side-panel">
            <div class="stat-box">
                <h3>Next</h3>
                <canvas id="next" width="80" height="80"></canvas>
            </div>
            <div class="stat-box">
                <h3>Score</h3>
                <p class="score" id="score">0</p>
            </div>
            <div class="stat-box">
                <h3>Time</h3>
                <p class="timer" id="timer">00:00</p>
            </div>
        </div>
    </div>

    <div id="game-over" class="overlay" style="display:none">
        <h1 class="main-logo">GAME OVER</h1>
        <div class="final-score-container">
            <p class="score-label">FINAL SCORE:</p>
            <div id="final-score" style="font-size: 48px; color: #ff00de;">0</div>
        </div>
        <button id="restart-btn">TRY AGAIN</button>
    </div>

    <div id="pause-overlay" class="overlay" style="display:none">
        <h1 class="main-logo">PAUSED</h1>
         <div class="current-score-container">
            <p class="score-text">CURRENT SCORE:</p>
            <div id="pause-score" style="font-size: 48px; color: #ff00de;">0</div>
        </div>
        <p style="color: #00f2ff; margin-top: 10px;">PRESS TO RESUME</p>
        <button id="resume-btn" class="ui-button" style="margin-top: 20px; width: 200px;">RESUME GAME</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
